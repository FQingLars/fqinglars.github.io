<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Репетиции</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
    .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #fff); font-size: 16px; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="main">
    <h2>🎭 Расписание репетиций</h2>
    <button class="btn" onclick="showAdd()">➕ Добавить репу</button>
    <button class="btn" onclick="showDel()">➖ Удалить репу</button>
    <button class="btn" onclick="loadReps()">🍳 Посмотреть репы</button>
    <div id="list"></div>
  </div>

  <div id="form-add" class="hidden">
    <h3>Добавить запись</h3>
    <input id="group-add" placeholder="Название группы">
    <input id="time-add" placeholder="DD.mm.YYYY HH:MM">
    <button class="btn" onclick="submitRep('add')">Отправить</button>
    <button class="btn" style="background:#888" onclick="back()">← Назад</button>
  </div>

  <div id="form-del" class="hidden">
    <h3>Удалить запись</h3>
    <input id="group-del" placeholder="Название группы">
    <input id="time-del" placeholder="DD.mm.YYYY HH:MM">
    <button class="btn" onclick="submitRep('del')">Отправить</button>
    <button class="btn" style="background:#888" onclick="back()">← Назад</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const API = '/api';
    const initData = tg.initData || '';

    function back() {
      document.querySelectorAll('div[id^="form-"]').forEach(el => el.classList.add('hidden'));
      document.getElementById('main').classList.remove('hidden');
    }
    function showAdd() { document.getElementById('main').classList.add('hidden'); document.getElementById('form-add').classList.remove('hidden'); }
    function showDel() { document.getElementById('main').classList.add('hidden'); document.getElementById('form-del').classList.remove('hidden'); }

    async function submitRep(action) {
      const group = document.getElementById(`group-${action}`).value;
      const time_str = document.getElementById(`time-${action}`).value;
      try {
        const res = await fetch(`${API}/rehearsal`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({group, time_str, action, init_data: initData})
        });
        const data = await res.json();
        tg.showAlert(data.message || (action==='add'?'Добавлено!':'Удалено!'));
        back();
      } catch(e) { tg.showAlert('Ошибка: ' + e.message); }
    }

    async function loadReps() {
      try {
        const res = await fetch(`${API}/rehearsals?init_data=${encodeURIComponent(initData)}`);
        const reps = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = reps.length ? reps.map(r => `<div><b>${r.time}</b>: ${r.group}</div>`).join('') : 'Репетиций нет.';
      } catch(e) { tg.showAlert('Не удалось загрузить расписание'); }
    }
  </script>
</body>
</html>
